openapi: 3.1.0
info:
  title: TransitOps API
  description: Smart Transport Operations Platform (End-to-End Logistics & Fleet Management)
  version: 1.0.0
servers:
  - url: http://localhost:8000/api
    description: Local Development Server

tags:
  - name: Dashboards
    description: Aggregated KPI and overview endpoints for specific views
  - name: Vehicles
    description: Vehicle registry and lifecycle management
  - name: Drivers
    description: Driver profile and compliance management
  - name: Trips
    description: Dispatching, routing, and trip lifecycles
  - name: Maintenance
    description: Vehicle maintenance and servicing logs
  - name: Expenses
    description: Fuel logging and operational cost tracking
  - name: Reports
    description: Financial and operational analytics

security:
  - bearerAuth: []

paths:
  # ---------------------------------------------------------
  # DASHBOARDS
  # ---------------------------------------------------------
  /dashboard/general:
    get:
      tags:
        - Dashboards
      summary: Get General Dashboard (KPIs)
      description: Returns fully assembled KPI data for the main dashboard including active vehicles, fleet utilization, and quick status counts.
      operationId: getGeneralDashboard
      parameters:
        - $ref: "#/components/parameters/RegionFilter"
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardGeneral"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /dashboard/dispatcher:
    get:
      tags:
        - Dashboards
      summary: Get Dispatcher Live Board
      description: Returns grouped lists of trips (Draft, Dispatched, Completed) and a quick list of available vehicles and drivers for the dispatcher view.
      operationId: getDispatcherDashboard
      responses:
        "200":
          description: Dispatcher board data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardDispatcher"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ---------------------------------------------------------
  # VEHICLES
  # ---------------------------------------------------------
  /vehicles:
    get:
      tags:
        - Vehicles
      summary: List Vehicles
      description: Paginated and searchable listing of vehicles for the Vehicle Registry.
      operationId: listVehicles
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Filter"
      responses:
        "200":
          description: Paginated vehicles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedVehicles"
    post:
      tags:
        - Vehicles
      summary: Register Vehicle
      description: Add a new vehicle to the registry. Default status is AVAILABLE.
      operationId: createVehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleMutateRequest"
      responses:
        "201":
          description: Vehicle created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"

  /vehicles/{id}:
    get:
      tags:
        - Vehicles
      summary: Get Vehicle
      operationId: getVehicle
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Vehicle details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags:
        - Vehicles
      summary: Update Vehicle
      operationId: updateVehicle
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleMutateRequest"
      responses:
        "200":
          description: Vehicle updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"

  # ---------------------------------------------------------
  # DRIVERS
  # ---------------------------------------------------------
  /drivers:
    get:
      tags:
        - Drivers
      summary: List Drivers
      description: Paginated list of drivers for Driver Management.
      operationId: listDrivers
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Filter"
      responses:
        "200":
          description: Paginated drivers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedDrivers"
    post:
      tags:
        - Drivers
      summary: Register Driver
      operationId: createDriver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DriverMutateRequest"
      responses:
        "201":
          description: Driver registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  /drivers/{id}:
    get:
      tags:
        - Drivers
      summary: Get Driver
      operationId: getDriver
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Driver details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags:
        - Drivers
      summary: Update Driver
      operationId: updateDriver
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DriverMutateRequest"
      responses:
        "200":
          description: Driver updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  /drivers/{id}/status:
    patch:
      tags:
        - Drivers
      summary: Toggle Driver Status
      description: Allows Safety Officer or Manager to manually suspend or mark a driver off-duty.
      operationId: changeDriverStatus
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  $ref: "#/components/schemas/DriverStatus"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  # ---------------------------------------------------------
  # TRIPS & DISPATCHING
  # ---------------------------------------------------------
  /trips:
    get:
      tags:
        - Trips
      summary: List Trips
      operationId: listTrips
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Filter"
      responses:
        "200":
          description: Paginated trips
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedTrips"
    post:
      tags:
        - Trips
      summary: Create Trip (Draft)
      description: Creates a draft trip. Validates that Cargo Weight <= Vehicle Capacity.
      operationId: createTrip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripMutateRequest"
      responses:
        "201":
          description: Trip created as Draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDetails"
        "400":
          $ref: "#/components/responses/BadRequest"

  /trips/{id}:
    get:
      tags:
        - Trips
      summary: Get Trip Details
      operationId: getTrip
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Trip Details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDetails"
        "404":
          $ref: "#/components/responses/NotFound"

  /trips/{id}/dispatch:
    post:
      tags:
        - Trips
      summary: Dispatch Trip
      description: Changes Trip to DISPATCHED. Automatically changes Vehicle and Driver status to ON_TRIP. Validates driver license is valid and both are AVAILABLE.
      operationId: dispatchTrip
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Trip Dispatched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDetails"
        "400":
          $ref: "#/components/responses/BadRequest"

  /trips/{id}/complete:
    post:
      tags:
        - Trips
      summary: Complete Trip
      description: Marks Trip COMPLETED. Restores Vehicle and Driver to AVAILABLE. Creates an automatic Fuel & Expense log. Updates Vehicle Odometer.
      operationId: completeTrip
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - finalOdometer
                - fuelConsumed
                - fuelCost
              properties:
                finalOdometer:
                  type: integer
                fuelConsumed:
                  type: number
                  description: Liters consumed
                fuelCost:
                  type: number
                  description: Total cost of fuel
                tollExpenses:
                  type: number
                  default: 0
      responses:
        "200":
          description: Trip Completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDetails"

  /trips/{id}/cancel:
    post:
      tags:
        - Trips
      summary: Cancel Trip
      description: Cancels a trip. If it was dispatched, restores Vehicle and Driver to AVAILABLE.
      operationId: cancelTrip
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Trip Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDetails"

  # ---------------------------------------------------------
  # MAINTENANCE
  # ---------------------------------------------------------
  /maintenance:
    get:
      tags:
        - Maintenance
      summary: List Maintenance Logs
      operationId: listMaintenance
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Filter"
      responses:
        "200":
          description: Paginated maintenance records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedMaintenanceLogs"
    post:
      tags:
        - Maintenance
      summary: Create Maintenance Record
      description: Starts a maintenance record. Automatically changes the vehicle status to IN_SHOP.
      operationId: startMaintenance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaintenanceMutateRequest"
      responses:
        "201":
          description: Maintenance started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceLog"

  /maintenance/{id}/complete:
    post:
      tags:
        - Maintenance
      summary: Complete Maintenance
      description: Closes the maintenance record, updates total operational cost, and restores vehicle to AVAILABLE.
      operationId: completeMaintenance
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - finalCost
              properties:
                finalCost:
                  type: number
                notes:
                  type: string
      responses:
        "200":
          description: Maintenance completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceLog"

  # ---------------------------------------------------------
  # FUEL & EXPENSES
  # ---------------------------------------------------------
  /expenses:
    get:
      tags:
        - Expenses
      summary: List Expenses
      description: View fuel logs, tolls, and maintenance costs.
      operationId: listExpenses
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Filter"
      responses:
        "200":
          description: Paginated expenses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedExpenses"
    post:
      tags:
        - Expenses
      summary: Add Misc Expense
      description: Manually log an expense (e.g., ad-hoc fuel, tolls).
      operationId: createExpense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseMutateRequest"
      responses:
        "201":
          description: Expense added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"

  # ---------------------------------------------------------
  # REPORTS & ANALYTICS
  # ---------------------------------------------------------
  /reports/analytics:
    get:
      tags:
        - Reports
      summary: Get Fleet Analytics
      description: Returns fully assembled chart data and KPIs for the Financial Analyst (Fuel Efficiency, Fleet Utilization, Operational Costs, Vehicle ROI).
      operationId: getAnalytics
      parameters:
        - name: month
          in: query
          schema:
            type: string
            example: "2026-07"
      responses:
        "200":
          description: Analytics and Chart Data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PathId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    PerPage:
      name: perPage
      in: query
      schema:
        type: integer
        default: 30
    Sort:
      name: sort
      in: query
      schema:
        type: string
    Filter:
      name: filter
      in: query
      schema:
        type: string
    RegionFilter:
      name: region
      in: query
      schema:
        type: string
        description: Filter dashboard by region

  responses:
    BadRequest:
      description: Bad Request (e.g. Validation Error like Cargo Weight > Capacity)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    # ------------------ Common ------------------
    PaginationMeta:
      type: object
      required:
        - page
        - perPage
        - totalItems
        - totalPages
      properties:
        page:
          type: integer
        perPage:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer

    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: boolean
          default: true
        message:
          type: string
        details:
          type: object
          additionalProperties: true

    ChartData:
      type: object
      required:
        - label
        - value
      properties:
        label:
          type: string
        value:
          type: number

    # ------------------ Enums ------------------
    VehicleStatus:
      type: string
      enum: [AVAILABLE, ON_TRIP, IN_SHOP, RETIRED]

    DriverStatus:
      type: string
      enum: [AVAILABLE, ON_TRIP, OFF_DUTY, SUSPENDED]

    TripStatus:
      type: string
      enum: [DRAFT, DISPATCHED, COMPLETED, CANCELLED]

    ExpenseType:
      type: string
      enum: [FUEL, TOLL, MAINTENANCE, OTHER]

    # ------------------ Models ------------------
    UserSummary:
      type: object
      required:
        - id
        - name
        - role
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        role:
          type: string
          enum: [FLEET_MANAGER, DRIVER, SAFETY_OFFICER, FINANCIAL_ANALYST]

    Vehicle:
      type: object
      required:
        - id
        - registrationNumber
        - model
        - type
        - capacityKg
        - odometer
        - acquisitionCost
        - status
      properties:
        id:
          type: string
          format: uuid
        registrationNumber:
          type: string
        model:
          type: string
        type:
          type: string
        capacityKg:
          type: number
        odometer:
          type: integer
        acquisitionCost:
          type: number
        status:
          $ref: "#/components/schemas/VehicleStatus"

    VehicleMutateRequest:
      type: object
      required:
        - registrationNumber
        - model
        - type
        - capacityKg
        - acquisitionCost
      properties:
        registrationNumber:
          type: string
        model:
          type: string
        type:
          type: string
        capacityKg:
          type: number
        odometer:
          type: integer
          default: 0
        acquisitionCost:
          type: number

    Driver:
      type: object
      required:
        - id
        - name
        - licenseNumber
        - licenseCategory
        - expiryDate
        - contact
        - safetyScore
        - status
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        licenseNumber:
          type: string
        licenseCategory:
          type: string
        expiryDate:
          type: string
          format: date
        contact:
          type: string
        safetyScore:
          type: integer
          description: "Scale 0-100"
        status:
          $ref: "#/components/schemas/DriverStatus"

    DriverMutateRequest:
      type: object
      required:
        - name
        - licenseNumber
        - licenseCategory
        - expiryDate
        - contact
      properties:
        name:
          type: string
        licenseNumber:
          type: string
        licenseCategory:
          type: string
        expiryDate:
          type: string
          format: date
        contact:
          type: string

    TripDetails:
      type: object
      required:
        - id
        - source
        - destination
        - vehicle
        - driver
        - cargoWeight
        - plannedDistance
        - status
      properties:
        id:
          type: string
          format: uuid
        source:
          type: string
        destination:
          type: string
        vehicle:
          $ref: "#/components/schemas/Vehicle"
        driver:
          $ref: "#/components/schemas/Driver"
        cargoWeight:
          type: number
        plannedDistance:
          type: number
        status:
          $ref: "#/components/schemas/TripStatus"
        dispatchTime:
          type: string
          format: date-time
        completeTime:
          type: string
          format: date-time
        etaMinutes:
          type: integer

    TripMutateRequest:
      type: object
      required:
        - source
        - destination
        - vehicleId
        - driverId
        - cargoWeight
        - plannedDistance
      properties:
        source:
          type: string
        destination:
          type: string
        vehicleId:
          type: string
          format: uuid
        driverId:
          type: string
          format: uuid
        cargoWeight:
          type: number
        plannedDistance:
          type: number

    MaintenanceLog:
      type: object
      required:
        - id
        - vehicle
        - serviceType
        - cost
        - date
        - status
      properties:
        id:
          type: string
          format: uuid
        vehicle:
          $ref: "#/components/schemas/Vehicle"
        serviceType:
          type: string
        cost:
          type: number
        date:
          type: string
          format: date
        status:
          type: string
          enum: [ACTIVE, COMPLETED]

    MaintenanceMutateRequest:
      type: object
      required:
        - vehicleId
        - serviceType
        - expectedCost
      properties:
        vehicleId:
          type: string
          format: uuid
        serviceType:
          type: string
        expectedCost:
          type: number
        date:
          type: string
          format: date

    Expense:
      type: object
      required:
        - id
        - vehicleId
        - type
        - amount
        - date
      properties:
        id:
          type: string
          format: uuid
        vehicleId:
          type: string
          format: uuid
        tripId:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/ExpenseType"
        amount:
          type: number
        liters:
          type: number
          description: "Only applicable if type is FUEL"
        date:
          type: string
          format: date
        notes:
          type: string

    ExpenseMutateRequest:
      type: object
      required:
        - vehicleId
        - type
        - amount
        - date
      properties:
        vehicleId:
          type: string
          format: uuid
        tripId:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/ExpenseType"
        amount:
          type: number
        liters:
          type: number
        date:
          type: string
          format: date
        notes:
          type: string

    # ------------------ Paginated Responses ------------------
    PaginatedVehicles:
      type: object
      properties:
        meta:
          $ref: "#/components/schemas/PaginationMeta"
        items:
          type: array
          items:
            $ref: "#/components/schemas/Vehicle"

    PaginatedDrivers:
      type: object
      properties:
        meta:
          $ref: "#/components/schemas/PaginationMeta"
        items:
          type: array
          items:
            $ref: "#/components/schemas/Driver"

    PaginatedTrips:
      type: object
      properties:
        meta:
          $ref: "#/components/schemas/PaginationMeta"
        items:
          type: array
          items:
            $ref: "#/components/schemas/TripDetails"

    PaginatedMaintenanceLogs:
      type: object
      properties:
        meta:
          $ref: "#/components/schemas/PaginationMeta"
        items:
          type: array
          items:
            $ref: "#/components/schemas/MaintenanceLog"

    PaginatedExpenses:
      type: object
      properties:
        meta:
          $ref: "#/components/schemas/PaginationMeta"
        items:
          type: array
          items:
            $ref: "#/components/schemas/Expense"

    # ------------------ Dashboard & Analytics Responses ------------------
    DashboardGeneral:
      type: object
      required:
        - kpis
        - vehicleStatusChart
        - recentTrips
      properties:
        kpis:
          type: object
          properties:
            activeVehicles:
              type: integer
            availableVehicles:
              type: integer
            vehiclesInMaintenance:
              type: integer
            activeTrips:
              type: integer
            pendingTrips:
              type: integer
            driversOnDuty:
              type: integer
            fleetUtilizationPercent:
              type: number
        vehicleStatusChart:
          type: array
          items:
            $ref: "#/components/schemas/ChartData"
        recentTrips:
          type: array
          items:
            $ref: "#/components/schemas/TripDetails"

    DashboardDispatcher:
      type: object
      required:
        - draftedTrips
        - activeTrips
        - completedTrips
        - availableVehicles
        - availableDrivers
      properties:
        draftedTrips:
          type: array
          items:
            $ref: "#/components/schemas/TripDetails"
        activeTrips:
          type: array
          items:
            $ref: "#/components/schemas/TripDetails"
        completedTrips:
          type: array
          items:
            $ref: "#/components/schemas/TripDetails"
        availableVehicles:
          type: array
          items:
            $ref: "#/components/schemas/Vehicle"
        availableDrivers:
          type: array
          items:
            $ref: "#/components/schemas/Driver"

    AnalyticsResponse:
      type: object
      required:
        - kpis
        - monthlyRevenueChart
        - costliestVehiclesChart
        - vehicleROI
      properties:
        kpis:
          type: object
          properties:
            fuelEfficiencyAvg:
              type: number
              description: "km/l"
            fleetUtilization:
              type: number
              description: "%"
            totalOperationalCost:
              type: number
            totalRevenue:
              type: number
        monthlyRevenueChart:
          type: array
          items:
            $ref: "#/components/schemas/ChartData"
        costliestVehiclesChart:
          type: array
          items:
            $ref: "#/components/schemas/ChartData"
        vehicleROI:
          type: array
          description: "[Revenue - (Maintenance + Fuel)] / Acquisition Cost per vehicle"
          items:
            type: object
            properties:
              vehicle:
                $ref: "#/components/schemas/Vehicle"
              roiPercent:
                type: number

openapi: 3.0.3
info:
  title: TransitOps API
  description: Smart Transport Operations Platform
  version: 1.0.0
servers:
  - url: http://localhost:8000/api
    description: Local Development Server

paths:
  /auth/me:
    get:
      tags: [Authentication]
      summary: Get Current User
      responses:
        "200":
          description: Current user details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSummary"

  /dashboard/general:
    get:
      tags: [Dashboards]
      summary: Get General Dashboard (KPIs)
      parameters:
        - in: query
          name: region
          schema:
            type: string
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardGeneral"

  /dashboard/dispatcher:
    get:
      tags: [Dashboards]
      summary: Get Dispatcher Live Board
      responses:
        "200":
          description: Dispatcher board data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardDispatcher"

  /vehicles:
    get:
      tags: [Vehicles]
      summary: List Vehicles
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Filter"
      responses:
        "200":
          description: Paginated vehicles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedVehicles"
    post:
      tags: [Vehicles]
      summary: Register Vehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleMutateRequest"
      responses:
        "201":
          description: Vehicle created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"

  /vehicles/{id}:
    get:
      tags: [Vehicles]
      summary: Get Vehicle
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Vehicle details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
    put:
      tags: [Vehicles]
      summary: Update Vehicle
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleMutateRequest"
      responses:
        "200":
          description: Vehicle updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
    delete:
      tags: [Vehicles]
      summary: Delete Vehicle
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "204":
          description: Vehicle deleted

  /vehicles/{vehicle_id}/image:
    post:
      tags: [Uploads & Documents]
      summary: Upload Vehicle Image
      parameters:
        - name: vehicle_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
      responses:
        "200":
          description: Image uploaded

  /vehicles/{vehicle_id}/documents:
    get:
      tags: [Uploads & Documents]
      summary: List Vehicle Documents
      parameters:
        - name: vehicle_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
    post:
      tags: [Uploads & Documents]
      summary: Upload Vehicle Document
      parameters:
        - name: vehicle_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, documentType]
              properties:
                file:
                  type: string
                  format: binary
                documentType:
                  type: string
                expiryDate:
                  type: string
                  format: date
      responses:
        "201":
          description: Document uploaded

  /documents/{document_id}:
    delete:
      tags: [Uploads & Documents]
      summary: Delete Document
      parameters:
        - name: document_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Document deleted

  /drivers:
    get:
      tags: [Drivers]
      summary: List Drivers
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Filter"
      responses:
        "200":
          description: Paginated drivers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedDrivers"
    post:
      tags: [Drivers]
      summary: Register Driver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DriverMutateRequest"
      responses:
        "201":
          description: Driver registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  /drivers/{id}:
    get:
      tags: [Drivers]
      summary: Get Driver
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Driver details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"
    put:
      tags: [Drivers]
      summary: Update Driver
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DriverMutateRequest"
      responses:
        "200":
          description: Driver updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"
    delete:
      tags: [Drivers]
      summary: Delete Driver
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "204":
          description: Driver deleted

  /drivers/{id}/status:
    patch:
      tags: [Drivers]
      summary: Toggle Driver Status
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: "#/components/schemas/DriverStatus"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  /trips:
    get:
      tags: [Trips]
      summary: List Trips
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Filter"
      responses:
        "200":
          description: Paginated trips
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedTrips"
    post:
      tags: [Trips]
      summary: Create Trip (Draft)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripMutateRequest"
      responses:
        "201":
          description: Trip created as Draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDetails"

  /trips/{id}:
    get:
      tags: [Trips]
      summary: Get Trip Details
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Trip Details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDetails"

  /trips/{id}/dispatch:
    post:
      tags: [Trips]
      summary: Dispatch Trip
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Trip Dispatched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDetails"

  /trips/{id}/complete:
    post:
      tags: [Trips]
      summary: Complete Trip
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteTripRequest"
      responses:
        "200":
          description: Trip Completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDetails"

  /trips/{id}/cancel:
    post:
      tags: [Trips]
      summary: Cancel Trip
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Trip Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDetails"

  /maintenance:
    get:
      tags: [Maintenance]
      summary: List Maintenance Logs
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Filter"
      responses:
        "200":
          description: Paginated maintenance records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedMaintenanceLogs"
    post:
      tags: [Maintenance]
      summary: Create Maintenance Record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaintenanceMutateRequest"
      responses:
        "201":
          description: Maintenance started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceLog"

  /maintenance/{id}/complete:
    post:
      tags: [Maintenance]
      summary: Complete Maintenance
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteMaintenanceRequest"
      responses:
        "200":
          description: Maintenance completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceLog"

  /expenses:
    get:
      tags: [Expenses]
      summary: List Expenses
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Filter"
      responses:
        "200":
          description: Paginated expenses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedExpenses"
    post:
      tags: [Expenses]
      summary: Add Misc Expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseMutateRequest"
      responses:
        "201":
          description: Expense added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"

  /reports/analytics:
    get:
      tags: [Reports]
      summary: Get Fleet Analytics
      parameters:
        - in: query
          name: month
          schema:
            type: string
            description: "Format: YYYY-MM"
      responses:
        "200":
          description: Analytics and Chart Data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsResponse"

  /ai/fleet-readiness/{vehicle_id}:
    get:
      tags: [AI Readiness]
      summary: Get AI Fleet Readiness Score
      parameters:
        - name: vehicle_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Readiness Score payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIFleetReadiness"

  /ai/driver-risk/{driver_id}:
    get:
      tags: [AI Readiness]
      summary: Get AI Driver Risk Score
      parameters:
        - name: driver_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Risk Score payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIDriverRisk"

  /fleet-locations:
    get:
      tags: [Fleet GPS]
      summary: List Fleet Locations
      parameters:
        - in: query
          name: activeOnly
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: List of fleet positions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetLocationResponse"
    post:
      tags: [Fleet GPS]
      summary: Publish Location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FleetLocationIn"
      responses:
        "202":
          description: Position recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetLocation"

  /fleet-locations/simulate:
    post:
      tags: [Fleet GPS]
      summary: Simulate Fleet Locations
      parameters:
        - in: query
          name: vehicleId
          schema:
            type: string
        - in: query
          name: latitude
          schema:
            type: number
            default: 12.9716
        - in: query
          name: longitude
          schema:
            type: number
            default: 77.5946
      responses:
        "200":
          description: Simulated positions generated
          content:
            application/json:
              schema:
                type: object
                required: [generated, items]
                properties:
                  generated:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/FleetLocation"

  /fleet-locations/stream:
    get:
      tags: [Fleet GPS]
      summary: SSE Stream for GPS
      responses:
        "200":
          description: Text Event Stream
          content:
            text/event-stream:
              schema:
                type: string

  /fleet-locations/{vehicle_id}:
    get:
      tags: [Fleet GPS]
      summary: Get Specific Vehicle Location
      parameters:
        - name: vehicle_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Vehicle GPS Position
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetLocation"

components:
  parameters:
    PathId:
      name: id
      in: path
      required: true
      schema:
        type: string
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    PerPage:
      name: perPage
      in: query
      schema:
        type: integer
        default: 30
    Sort:
      name: sort
      in: query
      schema:
        type: string
    Filter:
      name: filter
      in: query
      schema:
        type: string

  schemas:
    PaginationMeta:
      type: object
      required: [page, perPage, totalItems, totalPages]
      properties:
        page:
          type: integer
        perPage:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer

    ChartData:
      type: object
      required: [label, value]
      properties:
        label:
          type: string
        value:
          type: number

    VehicleStatus:
      type: string
      enum: [AVAILABLE, ON_TRIP, IN_SHOP, RETIRED]

    DriverStatus:
      type: string
      enum: [AVAILABLE, ON_TRIP, OFF_DUTY, SUSPENDED]

    TripStatus:
      type: string
      enum: [DRAFT, DISPATCHED, COMPLETED, CANCELLED]

    ExpenseType:
      type: string
      enum: [FUEL, TOLL, MAINTENANCE, OTHER]

    UserSummary:
      type: object
      required: [id, email, name, role, phone, isActive]
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
        phone:
          type: string
        isActive:
          type: boolean

    Vehicle:
      type: object
      required:
        [
          id,
          registrationNumber,
          model,
          type,
          capacityKg,
          odometer,
          acquisitionCost,
          status,
        ]
      properties:
        id:
          type: string
        registrationNumber:
          type: string
        model:
          type: string
        type:
          type: string
        capacityKg:
          type: number
        odometer:
          type: number
        acquisitionCost:
          type: number
        status:
          $ref: "#/components/schemas/VehicleStatus"

    VehicleMutateRequest:
      type: object
      required: [registrationNumber, model, type, capacityKg, acquisitionCost]
      properties:
        registrationNumber:
          type: string
        model:
          type: string
        type:
          type: string
        capacityKg:
          type: number
        odometer:
          type: integer
          default: 0
        acquisitionCost:
          type: number

    Driver:
      type: object
      required:
        [
          id,
          name,
          licenseNumber,
          licenseCategory,
          expiryDate,
          contact,
          safetyScore,
          status,
        ]
      properties:
        id:
          type: string
        name:
          type: string
        licenseNumber:
          type: string
        licenseCategory:
          type: string
        expiryDate:
          type: string
          format: date
        contact:
          type: string
        safetyScore:
          type: number
        status:
          $ref: "#/components/schemas/DriverStatus"

    DriverMutateRequest:
      type: object
      required: [name, licenseNumber, licenseCategory, expiryDate, contact]
      properties:
        name:
          type: string
        licenseNumber:
          type: string
        licenseCategory:
          type: string
        expiryDate:
          type: string
          format: date
        contact:
          type: string

    TripDetails:
      type: object
      required:
        [
          id,
          source,
          destination,
          vehicle,
          driver,
          cargoWeight,
          plannedDistance,
          status,
        ]
      properties:
        id:
          type: string
        source:
          type: string
        destination:
          type: string
        vehicle:
          $ref: "#/components/schemas/Vehicle"
        driver:
          $ref: "#/components/schemas/Driver"
        cargoWeight:
          type: number
        plannedDistance:
          type: number
        status:
          $ref: "#/components/schemas/TripStatus"
        dispatchTime:
          type: string
          format: date-time
        completeTime:
          type: string
          format: date-time
        etaMinutes:
          type: number

    TripMutateRequest:
      type: object
      required:
        [source, destination, vehicleId, driverId, cargoWeight, plannedDistance]
      properties:
        source:
          type: string
        destination:
          type: string
        vehicleId:
          type: string
        driverId:
          type: string
        cargoWeight:
          type: number
        plannedDistance:
          type: number

    CompleteTripRequest:
      type: object
      required: [finalOdometer, fuelConsumed, fuelCost]
      properties:
        finalOdometer:
          type: integer
        fuelConsumed:
          type: number
        fuelCost:
          type: number
        tollExpenses:
          type: number
          default: 0

    MaintenanceLog:
      type: object
      required: [id, vehicle, serviceType, cost, date, status]
      properties:
        id:
          type: string
        vehicle:
          $ref: "#/components/schemas/Vehicle"
        serviceType:
          type: string
        cost:
          type: number
        date:
          type: string
          format: date
        status:
          type: string
          enum: [ACTIVE, COMPLETED]

    MaintenanceMutateRequest:
      type: object
      required: [vehicleId, serviceType, expectedCost]
      properties:
        vehicleId:
          type: string
        serviceType:
          type: string
        expectedCost:
          type: number
        date:
          type: string
          format: date

    CompleteMaintenanceRequest:
      type: object
      required: [finalCost]
      properties:
        finalCost:
          type: number
        notes:
          type: string

    Expense:
      type: object
      required: [id, vehicleId, type, amount, date]
      properties:
        id:
          type: string
        vehicleId:
          type: string
        tripId:
          type: string
        type:
          $ref: "#/components/schemas/ExpenseType"
        amount:
          type: number
        liters:
          type: number
        date:
          type: string
          format: date
        notes:
          type: string

    ExpenseMutateRequest:
      type: object
      required: [vehicleId, type, amount, date]
      properties:
        vehicleId:
          type: string
        tripId:
          type: string
        type:
          $ref: "#/components/schemas/ExpenseType"
        amount:
          type: number
        liters:
          type: number
        date:
          type: string
          format: date
        notes:
          type: string

    PaginatedVehicles:
      type: object
      required: [meta, items]
      properties:
        meta:
          $ref: "#/components/schemas/PaginationMeta"
        items:
          type: array
          items:
            $ref: "#/components/schemas/Vehicle"

    PaginatedDrivers:
      type: object
      required: [meta, items]
      properties:
        meta:
          $ref: "#/components/schemas/PaginationMeta"
        items:
          type: array
          items:
            $ref: "#/components/schemas/Driver"

    PaginatedTrips:
      type: object
      required: [meta, items]
      properties:
        meta:
          $ref: "#/components/schemas/PaginationMeta"
        items:
          type: array
          items:
            $ref: "#/components/schemas/TripDetails"

    PaginatedMaintenanceLogs:
      type: object
      required: [meta, items]
      properties:
        meta:
          $ref: "#/components/schemas/PaginationMeta"
        items:
          type: array
          items:
            $ref: "#/components/schemas/MaintenanceLog"

    PaginatedExpenses:
      type: object
      required: [meta, items]
      properties:
        meta:
          $ref: "#/components/schemas/PaginationMeta"
        items:
          type: array
          items:
            $ref: "#/components/schemas/Expense"

    DashboardGeneral:
      type: object
      required: [kpis, vehicleStatusChart, recentTrips]
      properties:
        kpis:
          type: object
          required:
            [
              activeVehicles,
              availableVehicles,
              vehiclesInMaintenance,
              activeTrips,
              pendingTrips,
              driversOnDuty,
              fleetUtilizationPercent,
            ]
          properties:
            activeVehicles:
              type: integer
            availableVehicles:
              type: integer
            vehiclesInMaintenance:
              type: integer
            activeTrips:
              type: integer
            pendingTrips:
              type: integer
            driversOnDuty:
              type: integer
            fleetUtilizationPercent:
              type: number
        vehicleStatusChart:
          type: array
          items:
            $ref: "#/components/schemas/ChartData"
        recentTrips:
          type: array
          items:
            $ref: "#/components/schemas/TripDetails"

    DashboardDispatcher:
      type: object
      required:
        [
          draftedTrips,
          activeTrips,
          completedTrips,
          availableVehicles,
          availableDrivers,
        ]
      properties:
        draftedTrips:
          type: array
          items:
            $ref: "#/components/schemas/TripDetails"
        activeTrips:
          type: array
          items:
            $ref: "#/components/schemas/TripDetails"
        completedTrips:
          type: array
          items:
            $ref: "#/components/schemas/TripDetails"
        availableVehicles:
          type: array
          items:
            $ref: "#/components/schemas/Vehicle"
        availableDrivers:
          type: array
          items:
            $ref: "#/components/schemas/Driver"

    AnalyticsResponse:
      type: object
      required: [kpis, monthlyRevenueChart, costliestVehiclesChart, vehicleROI]
      properties:
        kpis:
          type: object
          required:
            [
              fuelEfficiencyAvg,
              fleetUtilization,
              totalOperationalCost,
              totalRevenue,
            ]
          properties:
            fuelEfficiencyAvg:
              type: number
            fleetUtilization:
              type: number
            totalOperationalCost:
              type: number
            totalRevenue:
              type: number
        monthlyRevenueChart:
          type: array
          items:
            $ref: "#/components/schemas/ChartData"
        costliestVehiclesChart:
          type: array
          items:
            $ref: "#/components/schemas/ChartData"
        vehicleROI:
          type: array
          items:
            type: object
            required: [vehicle, roiPercent]
            properties:
              vehicle:
                $ref: "#/components/schemas/Vehicle"
              roiPercent:
                type: number

